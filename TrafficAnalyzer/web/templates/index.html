<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TrafficAnalyzer</title>
  <style>
    :root {
      --bg-1: #0b1220;
      --bg-2: #12324a;
      --card: #f5f7fb;
      --text: #0f172a;
      --accent: #f59e0b;
      --accent-2: #0ea5e9;
    }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, #1e3a8a 0%, transparent 45%),
        radial-gradient(circle at 90% 90%, #0f766e 0%, transparent 40%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .panel {
      width: min(760px, 100%);
      background: var(--card);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.1;
    }
    p {
      color: #334155;
      margin-top: 12px;
    }
    .badge {
      display: inline-block;
      margin-top: 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: white;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      letter-spacing: .5px;
    }
    form {
      margin-top: 24px;
      display: grid;
      gap: 14px;
    }
    input[type="file"] {
      border: 1px dashed #94a3b8;
      border-radius: 12px;
      padding: 14px;
      background: white;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 18px;
      background: #0f172a;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.25);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>TrafficAnalyzer 流量安全分析</h1>
    <p>上传 PCAP 后自动执行三阶段分析：包解析、协议解析、攻击检测。</p>
    <span class="badge">Packet Parsing · Protocol Parsing · Attack Detection</span>
    <form method="post" action="/analyze" enctype="multipart/form-data">
      <input name="pcap_file" type="file" accept=".pcap,.pcapng,.cap" required>
      <button type="submit">开始分析</button>
    </form>
  </main>
</body>
</html>
