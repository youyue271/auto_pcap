        : `<div class="overview-empty">当前没有可视化的协议结果。把协议模块拖进工作区后，这里会显示分布。</div>`;

      let protocolPie = `<div class="overview-empty">暂无协议分布数据</div>`;
      if (distEntries.length) {
        let offset = 0;
        const segments = [];
        const legend = [];
        distEntries.forEach(([name, count], index) => {
          const color = protocolPalette[index % protocolPalette.length];
          const value = Number(count || 0);
          const percent = totalProtocolEvents > 0 ? (value / totalProtocolEvents) * 100 : 0;
          const end = offset + percent;
          segments.push(`${color} ${offset.toFixed(2)}% ${end.toFixed(2)}%`);
          legend.push(`
            <div class="overview-legend-item">
              <span class="overview-legend-swatch" style="background:${color};"></span>
              <span class="overview-legend-name">${esc(name)}</span>
              <span class="overview-legend-count">${esc(String(count))}</span>
              <span class="overview-legend-ratio">${esc(percent.toFixed(1))}%</span>
            </div>
          `);
          offset = end;
        });
        protocolPie = `
          <div class="overview-pie-wrap">
            <div class="overview-pie" style="background: conic-gradient(${segments.join(", ")});">
              <div class="overview-pie-center">
                <div class="k">协议事件</div>
                <div class="v">${esc(String(totalProtocolEvents))}</div>
              </div>
            </div>
            <div class="overview-legend">${legend.join("")}</div>
          </div>
        `;
      }

      const recommendationCards = recommendations.length
        ? recommendations.map((item) => {
            const exists = activeModules.some((module) => module.type === item.type && module.name === item.name);
            return `
              <div class="overview-recommend-card">
                <div class="name">${esc(item.name)}</div>
                <div class="meta">基础层级命中 ${esc(String(item.count || 0))} 条</div>
                <div class="meta">${esc(item.description || "")}</div>
                <div class="actions">
                  <button
                    type="button"
                    class="tiny-btn ${exists ? "secondary" : ""}"
                    data-action="overview-add-module"
                    data-type="${esc(item.type || "protocol")}"
                    data-name="${esc(item.name)}"
                    ${exists ? "disabled" : ""}
                  >${exists ? "已加入" : "加入解析"}</button>
                </div>
              </div>
            `;
          }).join("")
        : `<div class="overview-empty">基础层级统计暂未命中已注册协议模块。</div>`;

      pane.innerHTML = `
        <div class="grid3">
          <div class="metric"><div class="k">总 Packet</div><div class="v">${esc(totalPacketText)}</div></div>
          <div class="metric"><div class="k">Packet 数</div><div class="v">${overview.packet_count || 0}</div></div>
          <div class="metric"><div class="k">解析进度</div><div class="v" style="font-size:16px;">${esc(progressText)}</div></div>
          <div class="metric"><div class="k">协议事件</div><div class="v">${overview.protocol_event_count || 0}</div></div>
          <div class="metric"><div class="k">攻击告警</div><div class="v">${overview.alert_count || 0}</div></div>
          <div class="metric"><div class="k">最近刷新</div><div class="v" style="font-size:16px;">${esc(progress.updated_at ? new Date(progress.updated_at).toLocaleTimeString() : "-")}</div></div>
        </div>
        <div class="overview-protocols">
          <div class="muted" style="margin-bottom:8px;">基础协议层级统计</div>
          <div class="overview-protocol-grid">${protocolCards}</div>
          ${protocolPie}
        </div>
        <div class="overview-protocols">
          <div class="muted" style="margin-bottom:8px;">推荐解析模块</div>
          <div class="overview-recommend-grid">${recommendationCards}</div>
        </div>
        <table>
          <thead><tr><th>协议</th><th>事件数</th></tr></thead>
          <tbody>${distRows}</tbody>

      pane.querySelectorAll("button[data-action='overview-add-module']").forEach((button) => {

          await addActiveModule({
            type: button.dataset.type || "protocol",

            description: findModuleDescription(button.dataset.type || "protocol", button.dataset.name || ""),
          });
        });
      });
    }

    function aggregateProtocolDistribution() {
      const summary = {};
      for (const module of activeModules) {
        if (module.type !== "protocol") continue;
        const m = getModuleResult(module);
        const moduleSummary = m?.result?.summary || {};
        const detail = m?.result?.detail || {};
        if (moduleSummary.protocol_event_count != null) summary[module.name] = Number(moduleSummary.protocol_event_count || 0);
        else if (detail.request_count != null) summary[module.name] = Number(detail.request_count || 0);
        else if (detail.query_count != null) summary[module.name] = Number(detail.query_count || 0);
        else if (detail.session_count != null) summary[module.name] = Number(detail.session_count || 0);
        else if (detail.operation_count != null) summary[module.name] = Number(detail.operation_count || 0);
        else if (detail.record_count != null) summary[module.name] = Number(detail.record_count || 0);
      }
      return summary;
    }

        <table>
          <thead><tr><th>模块</th><th>总耗时(ms)</th><th>协议解析(ms)</th><th>攻击检测(ms)</th><th>异常数</th></tr></thead>

    function renderRawPane() {
      const pane = document.getElementById("pane-raw");
      const context = getInspectContext();
      const payload = context.kind === "module"
        ? {
            context: {
              kind: context.kind,
              label: context.label,
              module: context.module,
            },
            result: getModuleResult(context.module),
          }
        : {
            context: {
              kind: context.kind,
              label: context.label,
            },
            status: latestStatus,
            results: latestResults,
          };
      pane.innerHTML = `<pre class="raw">${esc(JSON.stringify(payload, null, 2))}</pre>`;
    }

    function renderModulePanes() {
      for (const module of activeModules) {
        const pane = document.getElementById(`pane-module-${module.type}-${module.name}`);
        if (!pane) continue;
        const resultItem = getModuleResult(module);
        if (!resultItem || !resultItem.result) {
          const progressText = module.state === "running" && module.progress
            ? ` · 进度: ${esc(formatModuleProgress(module.progress))}`
            : "";
          pane.innerHTML = `<div class="muted">模块状态: ${esc(module.state || "pending")}，等待结果...${progressText}</div>`;
          continue;
        }
        if (module.type === "protocol") {
          renderProtocolPane(pane, module, resultItem.result);
        } else {
          renderAttackPane(pane, module, resultItem.result);
        }
      }
    }

    function getModuleResult(module) {
      const list = latestResults?.modules || [];
      return list.find((item) => item.module_type === module.type && item.module_name === module.name);
    }

    function renderProtocolPane(pane, module, result) {
      if (module.name === "HTTP") {
        renderHTTPPane(pane, module, result);
        return;
      }
      if (module.name === "DNS") {
        renderDNSPane(pane, module, result);
        return;
      }
      const detail = result.detail || {};
      const topKeys = Object.keys(detail).filter((k) => k.startsWith("top_"));
      const recordKey = ["requests", "queries", "sessions", "operations", "records"].find((k) => Array.isArray(detail[k]));

      let html = `<div class="muted" style="margin-bottom:8px;">模块 ${esc(module.name)} 已完成解析。</div>`;
      for (const topKey of topKeys) {
        const rows = detail[topKey] || [];
        const body = rows.map((item) => `<tr><td>${esc(item[0])}</td><td>${item[1]}</td></tr>`).join("")
          || `<tr><td colspan="2" class="muted">无数据</td></tr>`;
        html += `
          <details class="data" open>
            <summary>${esc(topKey)}</summary>
            <table><thead><tr><th>value</th><th>count</th></tr></thead><tbody>${body}</tbody></table>
          </details>
        `;
      }

      if (recordKey) {
        const rows = detail[recordKey] || [];
        if (rows.length) {
          const cols = Array.from(rows.reduce((set, row) => {
            Object.keys(row).forEach((k) => set.add(k));
            return set;
          }, new Set()));
          const body = rows.map((row) => `<tr>${cols.map((c) => `<td>${esc(row[c])}</td>`).join("")}</tr>`).join("");
          html += `
            <details class="data" open>
              <summary>${esc(recordKey)} (${rows.length})</summary>
              <table><thead><tr>${cols.map((c) => `<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>
            </details>
          `;
        } else {
          html += `<div class="muted">记录列表为空</div>`;
        }
      }

      pane.innerHTML = html;
    }

    function renderHTTPPane(pane, module, result) {
      const detail = result.detail || {};
      const requests = Array.isArray(detail.requests) ? detail.requests : [];
      const requestCount = Number(detail.request_count || 0);
      const requestsCoverAll = requestCount > 0 && requests.length >= requestCount;
      const topStatusCodes = Array.isArray(detail.top_status_codes) ? detail.top_status_codes : [];
      const topStatusCodesTotal = Number(detail.top_status_codes_total || topStatusCodes.length || 0);
      const sitePages = Array.isArray(detail.site_pages) ? detail.site_pages : [];
      const sitePagesTotal = Number(detail.site_pages_total || sitePages.length || 0);
      const sitePagesExported = Number(
        detail.site_pages_exported || sitePages.filter((item) => String(item?.url || "").trim()).length || 0
      );
      const siteHostsTotal = Number(detail.site_hosts_total || 0);
      const normalizeHttpUriPath = (value) => {
        const text = String(value || "").trim();
        if (!text) return "";
        try {
          const parsed = new URL(text);
          const path = String(parsed.pathname || "").trim();
          if (path) return path;
          if (String(parsed.protocol || "").trim() && String(parsed.host || "").trim()) {
            return "/";
          }
        } catch (err) {
          return text.split("?", 1)[0].split("#", 1)[0].trim();
        }
        return text.split("?", 1)[0].split("#", 1)[0].trim();
      };
      const rebuildHttpRanking = (kind) => {
        const counter = new Map();
        for (const row of requests) {
          if (String(row?.direction || "") !== "request") continue;
          const rawValue = kind === "host" ? String(row?.host || "").trim() : normalizeHttpUriPath(row?.uri);
          if (!rawValue) continue;
          counter.set(rawValue, (counter.get(rawValue) || 0) + 1);
        }
        return [...counter.entries()].sort((left, right) => {
          if (right[1] !== left[1]) return right[1] - left[1];
          return String(left[0]).localeCompare(String(right[0]));
        });
      };
      let topHosts = Array.isArray(detail.top_hosts) ? detail.top_hosts : [];
      let topPaths = Array.isArray(detail.top_paths) ? detail.top_paths : [];
      let topHostsTotal = Number(detail.top_hosts_total || topHosts.length || 0);
      let topPathsTotal = Number(detail.top_paths_total || topPaths.length || 0);
      if (requestsCoverAll && topHostsTotal > topHosts.length) {
        topHosts = rebuildHttpRanking("host");
        topHostsTotal = topHosts.length;
      }
      if (requestsCoverAll && topPathsTotal > topPaths.length) {
        topPaths = rebuildHttpRanking("path");
        topPathsTotal = topPaths.length;
      }
      const state = getPaneUiState(`protocol:${module.name}`, {
        hostLimit: "20",
        pathLimit: "20",
        direction: "__all__",
        method: "__all__",
        contentType: "__all__",
        keyword: "",
      });
      const buildLimitOptions = (rowCount) => {
        const base = [10, 20, 30, 50, 100];
        const count = Math.max(0, Number(rowCount || 0));
        const options = [];
        for (const value of base) {
          if (value < count) {
            options.push({ value: String(value), label: String(value) });
          }
        }
        if (count > 0) {
          options.push({ value: String(count), label: String(count) });
        }
        options.push({ value: "__all__", label: "全部" });
        return options;
      };
      const hostLimitOptions = buildLimitOptions(topHosts.length);
      const pathLimitOptions = buildLimitOptions(topPaths.length);

      pane.innerHTML = `
        <div class="muted" style="margin-bottom:8px;">HTTP 协议解析</div>
        <details class="data" open>
          <summary>主机统计</summary>
          <div style="padding-top:10px;">
            <div class="ws-filter-row">
              <label for="http-host-limit">显示条数</label>
              <select id="http-host-limit">
                ${hostLimitOptions.map((item) => `<option value="${esc(item.value)}"${item.value === state.hostLimit ? " selected" : ""}>${esc(item.label)}</option>`).join("")}
              </select>
            </div>
            <div data-role="http-hosts-content" style="padding-top:10px;"></div>
          </div>
        </details>
        <details class="data" open>
          <summary>路径统计</summary>
          <div style="padding-top:10px;">
            <div class="ws-filter-row">
              <label for="http-path-limit">显示条数</label>
              <select id="http-path-limit">
                ${pathLimitOptions.map((item) => `<option value="${esc(item.value)}"${item.value === state.pathLimit ? " selected" : ""}>${esc(item.label)}</option>`).join("")}
              </select>
            </div>
            <div data-role="http-paths-content" style="padding-top:10px;"></div>
          </div>
        </details>
        <details class="data" open>
          <summary>响应码统计</summary>
          <div style="padding-top:10px;">
            <div data-role="http-status-content"></div>
          </div>
        </details>
        <details class="data" open>
          <summary>网站重建</summary>
          <div style="padding-top:10px;">
            <div data-role="http-site-content"></div>
          </div>
        </details>
        <details class="data" open>
          <summary>筛选</summary>
          <div style="padding-top:10px;">
            <div class="http-filter-grid">
              <div class="http-filter-field">
                <label for="http-filter-direction">方向</label>
                <select id="http-filter-direction">
                  <option value="__all__">全部</option>
                </select>
              </div>
              <div class="http-filter-field">
                <label for="http-filter-method">方法</label>
                <select id="http-filter-method">
                  <option value="__all__">全部</option>
                </select>
              </div>
              <div class="http-filter-field">
                <label for="http-filter-ctype">内容类型</label>
                <select id="http-filter-ctype">
                  <option value="__all__">全部</option>
                </select>
              </div>
              <div class="http-filter-field">
                <label for="http-filter-keyword">关键字</label>
                <input id="http-filter-keyword" type="text" placeholder="uri / host / payload">
              </div>
            </div>
            <div data-role="http-filter-content"></div>
          </div>
        </details>
      `;

      const hostLimitSelect = pane.querySelector("#http-host-limit");
      const pathLimitSelect = pane.querySelector("#http-path-limit");
      const hostsContent = pane.querySelector('[data-role="http-hosts-content"]');
      const pathsContent = pane.querySelector('[data-role="http-paths-content"]');
      const statusContent = pane.querySelector('[data-role="http-status-content"]');
      const siteContent = pane.querySelector('[data-role="http-site-content"]');
      const filterDirection = pane.querySelector("#http-filter-direction");
      const filterMethod = pane.querySelector("#http-filter-method");
      const filterCtype = pane.querySelector("#http-filter-ctype");
      const filterKeyword = pane.querySelector("#http-filter-keyword");
      const filterContent = pane.querySelector('[data-role="http-filter-content"]');

      const appendOptions = (select, values) => {
        const options = Array.from(new Set(values.filter((item) => String(item || "").trim()))).sort();
        for (const value of options) {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        }
      };

      appendOptions(filterDirection, requests.map((item) => item.direction));
      appendOptions(filterMethod, requests.map((item) => item.method));
      appendOptions(filterCtype, requests.map((item) => item.content_type));

      if (filterDirection) filterDirection.value = state.direction;
      if (filterMethod) filterMethod.value = state.method;
      if (filterCtype) filterCtype.value = state.contentType;
      if (filterKeyword) filterKeyword.value = state.keyword;

      const defaultLimitValue = (options) => options.find((item) => item.value !== "__all__")?.value || "__all__";
      const normalizeLimitValue = (select, options, fallback) => {
        const raw = String(select?.value || fallback);
        const validFallback = options.some((item) => item.value === fallback) ? fallback : defaultLimitValue(options);
        const valid = options.some((item) => item.value === raw) ? raw : validFallback;
        if (select) {
          select.value = valid;
        }
        return valid;
      };

      if (hostLimitSelect) {
        state.hostLimit = normalizeLimitValue(hostLimitSelect, hostLimitOptions, state.hostLimit || defaultLimitValue(hostLimitOptions));
      }
      if (pathLimitSelect) {
        state.pathLimit = normalizeLimitValue(pathLimitSelect, pathLimitOptions, state.pathLimit || defaultLimitValue(pathLimitOptions));
      }

      const renderRankingTable = (container, rows, totalCount, limitValue, emptyText = "无数据") => {
        const normalizedLimit = String(limitValue || "20");
        const limitNumber = normalizedLimit === "__all__" ? rows.length : Math.max(0, Number.parseInt(normalizedLimit, 10) || 0);
        const visibleRows = normalizedLimit === "__all__" ? rows : rows.slice(0, limitNumber);
        const selectedLabel = normalizedLimit === "__all__" ? "全部" : String(limitNumber);

        container.innerHTML = `
          <div class="http-filter-count">当前展示 ${esc(String(visibleRows.length))} 条 / 共 ${esc(String(totalCount || rows.length || 0))} 条，选择上限 ${esc(String(selectedLabel))}</div>
          <div class="scroll-box">
            <table>
              <thead><tr><th>value</th><th>count</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        `;

        const tbody = container.querySelector("tbody");
        if (!tbody) return;
        if (!visibleRows.length) {
          tbody.innerHTML = `<tr><td colspan="2" class="muted">${esc(emptyText)}</td></tr>`;
          return;
        }
        for (const item of visibleRows) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${esc(item[0])}</td><td>${esc(item[1])}</td>`;
          tbody.appendChild(tr);
        }
      };

      const safeDecodeUriPart = (value) => {
        const text = String(value || "");
        if (!text) return "";
        try {
          return decodeURIComponent(text);
        } catch (err) {
          return text;
        }
      };

      const preferSitePage = (current, next) => {
        if (!current) return next;
        if (!next) return current;
        const currentHasUrl = Boolean(String(current.url || "").trim());
        const nextHasUrl = Boolean(String(next.url || "").trim());
        if (currentHasUrl !== nextHasUrl) {
          return nextHasUrl ? next : current;
        }
        const currentPacket = Number(current.response_packet_index ?? -1);
        const nextPacket = Number(next.response_packet_index ?? -1);
        return nextPacket >= currentPacket ? next : current;
      };

      const buildSiteGroups = (rows) => {
        const groups = new Map();
        for (const row of rows) {
          const serverIp = String(row?.server_ip || "").trim() || "unknown_server";
          const host = String(row?.host || "").trim();
          const uriPath = normalizeHttpUriPath(row?.uri_path || row?.uri || "/") || "/";
          let group = groups.get(serverIp);
          if (!group) {
            group = {
              serverIp,
              hosts: new Set(),
              pageCount: 0,
              root: { label: "/", page: null, children: new Map() },
            };
            groups.set(serverIp, group);
          }
          if (host) {
            group.hosts.add(host);
          }
          group.pageCount += 1;

          const segments = uriPath === "/"
            ? []
            : uriPath.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean).map(safeDecodeUriPart);
          if (!segments.length) {
            group.root.page = preferSitePage(group.root.page, row);
            continue;
          }

          let node = group.root;
          for (const segment of segments) {
            let child = node.children.get(segment);
            if (!child) {
              child = { label: segment, page: null, children: new Map() };
              node.children.set(segment, child);
            }
            node = child;
          }
          node.page = preferSitePage(node.page, row);
        }
        return [...groups.values()].sort((left, right) => String(left.serverIp).localeCompare(String(right.serverIp)));
      };

      const renderSiteLabel = (row, label) => {
        const meta = [];
        if (row?.host) meta.push(`host=${row.host}`);
        if (row?.content_type) meta.push(String(row.content_type));
        if (row?.response_packet_index != null) meta.push(`resp=${row.response_packet_index}`);
        const targetUrl = String(row?.viewer_url || row?.url || "").trim();
        const labelHtml = targetUrl
          ? `<a href="${esc(targetUrl)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${esc(label)}</a>`
          : `<span>${esc(label)}</span>`;
        return `${labelHtml}${meta.length ? `<span class="http-site-meta">${esc(meta.join(" | "))}</span>` : ""}`;
      };

      const renderSiteNode = (node) => {
        const children = [...node.children.values()]
          .sort((left, right) => String(left.label).localeCompare(String(right.label)))
          .map((child) => renderSiteNode(child))
          .join("");
        const labelHtml = node.page
          ? renderSiteLabel(node.page, node.label)
          : `<span>${esc(node.label)}</span>`;

        if (!children) {
          return `<div class="http-site-leaf">${labelHtml}</div>`;
        }

        return `
          <details class="http-site-node" open>
            <summary>${labelHtml}</summary>
            <div class="http-site-branch">${children}</div>
          </details>
        `;
      };

      const renderSitePages = () => {
        if (!siteContent) return;
        const groups = buildSiteGroups(sitePages);
        if (!groups.length) {
          siteContent.innerHTML = `<div class="overview-empty">当前没有命中 GET + 200 的可重建站点资源。</div>`;
          return;
        }

        const cards = groups.map((group) => {
          const hosts = [...group.hosts].sort().join(", ");
          const rootLeaf = group.root.page
            ? `<div class="http-site-leaf">${renderSiteLabel(group.root.page, "/")}</div>`
            : "";
          const nodes = [...group.root.children.values()]
            .sort((left, right) => String(left.label).localeCompare(String(right.label)))
            .map((child) => renderSiteNode(child))
            .join("");
          return `
            <div class="http-site-group">
              <div class="ws-command-meta">server_ip=${esc(group.serverIp)}${hosts ? ` | hosts=${esc(hosts)}` : ""} | pages=${esc(String(group.pageCount))}</div>
              <div class="http-site-tree">
                ${rootLeaf}
                ${nodes || (!rootLeaf ? `<div class="muted">当前只有根路径资源</div>` : "")}
              </div>
            </div>
          `;
        }).join("");

        siteContent.innerHTML = `
          <div class="ws-meta-grid" style="margin-bottom:10px;">
            <div class="ws-meta-card">
              <div class="muted">站点资源</div>
              <div class="ws-meta-body">${esc(String(sitePages.length))} / ${esc(String(sitePagesTotal || sitePages.length || 0))}</div>
            </div>
            <div class="ws-meta-card">
              <div class="muted">已导出页面</div>
              <div class="ws-meta-body">${esc(String(sitePagesExported))}</div>
            </div>
            <div class="ws-meta-card">
              <div class="muted">目标 IP</div>
              <div class="ws-meta-body">${esc(String(siteHostsTotal || groups.length))}</div>
            </div>
          </div>
          <div class="http-site-scroll">${cards}</div>
        `;
      };

      const renderFilteredRequests = () => {
        const direction = String(filterDirection?.value || "__all__");
        const method = String(filterMethod?.value || "__all__");
        const contentType = String(filterCtype?.value || "__all__");
        const keyword = String(filterKeyword?.value || "").trim().toLowerCase();
        state.direction = direction;
        state.method = method;
        state.contentType = contentType;
        state.keyword = String(filterKeyword?.value || "");

        const rows = requests.filter((row) => {
          if (direction !== "__all__" && String(row.direction || "") !== direction) {
            return false;
          }
          if (method !== "__all__" && String(row.method || "") !== method) {
            return false;
          }
          if (contentType !== "__all__" && String(row.content_type || "") !== contentType) {
            return false;
          }
          if (!keyword) {
            return true;
          }
          const haystack = [
            row.host,
            row.uri,
            row.method,
            row.status_code,
            row.content_type,
            row.payload_preview,
          ].map((item) => String(item || "").toLowerCase()).join("\n");
          return haystack.includes(keyword);
        });

        const visibleRows = rows.slice(0, 120);
        const body = visibleRows.map((row) => `
          <tr>
            <td>${esc(row.packet_index)}</td>
            <td>${esc(row.direction || "")}</td>
            <td>${esc(row.method || "")}</td>
            <td>${esc(row.status_code || "")}</td>
            <td>${esc(row.uri || "")}</td>
            <td>${esc(row.content_type || "")}</td>
            <td>${esc(row.payload_preview || "")}</td>
          </tr>
        `).join("") || `<tr><td colspan="7" class="muted">没有匹配结果</td></tr>`;

        filterContent.innerHTML = `
          <div class="http-filter-count">命中 ${esc(String(rows.length))} 条，当前展示 ${esc(String(visibleRows.length))} 条</div>
          <div class="scroll-box">
            <table>
              <thead>
                <tr><th>packet</th><th>direction</th><th>method</th><th>status</th><th>uri</th><th>content_type</th><th>payload</th></tr>
              </thead>
              <tbody>${body}</tbody>
            </table>
          </div>
        `;
      };

      const bindRankingLimit = (select, stateKey, container, rows, totalCount) => {
        if (!select || !container) return;
        const rerender = () => {
          const options = stateKey === "hostLimit" ? hostLimitOptions : pathLimitOptions;
          state[stateKey] = normalizeLimitValue(select, options, state[stateKey] || defaultLimitValue(options));
          renderRankingTable(container, rows, totalCount, state[stateKey]);
        };
        select.addEventListener("change", rerender);
        select.addEventListener("input", rerender);
      };

      bindRankingLimit(hostLimitSelect, "hostLimit", hostsContent, topHosts, topHostsTotal);
      bindRankingLimit(pathLimitSelect, "pathLimit", pathsContent, topPaths, topPathsTotal);
      for (const element of [filterDirection, filterMethod, filterCtype]) {
        if (element) {
          element.addEventListener("change", renderFilteredRequests);
        }
      }
      if (filterKeyword) {
        filterKeyword.addEventListener("input", renderFilteredRequests);
      }

      if (hostsContent) {
        renderRankingTable(hostsContent, topHosts, topHostsTotal, state.hostLimit);
      }
      if (pathsContent) {
        renderRankingTable(pathsContent, topPaths, topPathsTotal, state.pathLimit);
      }
      if (statusContent) {
        renderRankingTable(statusContent, topStatusCodes, topStatusCodesTotal, "__all__", "无响应码数据");
      }
      renderSitePages();
      renderFilteredRequests();
    }

    function renderDNSPane(pane, module, result) {
      const detail = result.detail || {};
      const queries = Array.isArray(detail.queries) ? detail.queries : [];
      const topQueries = Array.isArray(detail.top_queries) ? detail.top_queries : [];
      const fieldOptions = Array.isArray(detail.field_options) && detail.field_options.length
        ? detail.field_options
        : [
            { value: "query_name", label: "查询域名" },
            { value: "response", label: "响应值" },
          ];
      const analysisRows = Array.isArray(detail.analysis_rows) && detail.analysis_rows.length
        ? detail.analysis_rows
        : queries;
      const suspiciousPatterns = Array.isArray(detail.suspicious_patterns) ? detail.suspicious_patterns : [];
      const decodedCandidates = Array.isArray(detail.decoded_candidates) ? detail.decoded_candidates : [];
      const state = getPaneUiState(`protocol:${module.name}`, {
        field: "query_name",
        contains: "",
        delimiter: ".",
        extractor: "first_label",
        segmentIndex: "0",
        joiner: "",
        decoder: "auto",
      });

      const topQueryBody = topQueries.length
        ? topQueries.map((item) => `<tr><td>${esc(item[0])}</td><td>${esc(item[1])}</td></tr>`).join("")
        : `<tr><td colspan="2" class="muted">无数据</td></tr>`;
      const patternCards = suspiciousPatterns.length
        ? suspiciousPatterns.map((item) => `
            <div class="dns-pattern-card">
              <div class="dns-pattern-title">${esc(item.field_label || item.field)} / ${esc(item.extractor_label || item.extractor)}</div>
              <div class="dns-pattern-meta">kind=${esc(item.match_kind || "")}
ratio=${esc(String(item.match_ratio || 0))}% (${esc(String(item.matched_count || 0))}/${esc(String(item.total_count || 0))})
joined_preview=${esc(item.joined_preview || "")}
samples=${esc((item.samples || []).join(", "))}</div>
            </div>
          `).join("")
        : `<div class="overview-empty">当前没有明显的 DNS 藏数模式命中。</div>`;
      const candidateCards = decodedCandidates.length
        ? decodedCandidates.map((item) => `
            <div class="dns-output-card">
              <div class="dns-pattern-title">${esc(item.title || "候选解码结果")}</div>
              <div class="dns-pattern-meta">chain=${esc(item.decode_chain || "-")}
layers=${esc(String(item.decode_layers || 0))}
joined_length=${esc(String(item.joined_length || 0))}
joined_preview=${esc(item.joined_preview || "")}</div>
              <pre>${esc(item.decoded_text || item.decoded_preview || "(空)")}</pre>
            </div>
          `).join("")
        : `<div class="overview-empty">当前没有自动解码结果。</div>`;

      pane.innerHTML = `
        <div class="muted" style="margin-bottom:8px;">DNS 协议解析</div>
        <div class="ws-meta-grid" style="margin-bottom:10px;">
          <div class="ws-meta-card">
            <div class="ws-meta-label">DNS 事件数</div>
            <div class="ws-meta-body">${esc(String(detail.query_count || analysisRows.length || 0))}</div>
          </div>
          <div class="ws-meta-card">
            <div class="ws-meta-label">分析样本数</div>
            <div class="ws-meta-body">${esc(String(detail.analysis_row_count || analysisRows.length || 0))}${detail.analysis_truncated ? " (已截断)" : ""}</div>
          </div>
          <div class="ws-meta-card">
            <div class="ws-meta-label">自动模式命中</div>
            <div class="ws-meta-body">${esc(String(suspiciousPatterns.length))}</div>
          </div>
          <div class="ws-meta-card">
            <div class="ws-meta-label">自动候选解码</div>
            <div class="ws-meta-body">${esc(String(decodedCandidates.length))}</div>
          </div>
        </div>
        <details class="data" open>
          <summary>高频 DNS 查询</summary>
          <div style="padding-top:10px;">
            <div class="scroll-box">
              <table>
                <thead><tr><th>query</th><th>count</th></tr></thead>
                <tbody>${topQueryBody}</tbody>
              </table>
            </div>
          </div>
        </details>
        <details class="data" open>
          <summary>DNS 藏数模式分析</summary>
          <div style="padding-top:10px;">
            <div class="dns-pattern-grid">${patternCards}</div>
            <div class="dns-pattern-grid">${candidateCards}</div>
          </div>
        </details>
        <details class="data" open>
          <summary>自定义 DNS 解析模板</summary>
          <div style="padding-top:10px;">
            <div class="dns-template-grid">
              <div class="dns-template-field">
                <label for="dns-template-field">字段</label>
                <select id="dns-template-field">
                  ${fieldOptions.map((item) => `<option value="${esc(item.value)}">${esc(item.label)}</option>`).join("")}
                </select>
              </div>
              <div class="dns-template-field">
                <label for="dns-template-contains">包含关键字</label>
                <input id="dns-template-contains" type="text" placeholder="example.com / flag">
              </div>
              <div class="dns-template-field">
                <label for="dns-template-delimiter">分隔符</label>
                <input id="dns-template-delimiter" type="text" placeholder=".">
              </div>
              <div class="dns-template-field">
                <label for="dns-template-extractor">取值方式</label>
                <select id="dns-template-extractor">
                  <option value="full_value">完整字段</option>
                  <option value="first_label">第 1 段</option>
                  <option value="last_label">最后 1 段</option>
                  <option value="nth_label">第 N 段</option>
                  <option value="joined_labels">去掉分隔符后拼接</option>
                </select>
              </div>
              <div class="dns-template-field">
                <label for="dns-template-index">段序号</label>
                <input id="dns-template-index" type="number" min="0" step="1" placeholder="0">
              </div>
              <div class="dns-template-field">
                <label for="dns-template-joiner">拼接符</label>
                <input id="dns-template-joiner" type="text" placeholder="默认直接拼接">
              </div>
              <div class="dns-template-field">
                <label for="dns-template-decoder">解码方式</label>
                <select id="dns-template-decoder">
                  <option value="none">不解码</option>
                  <option value="auto">自动链式</option>
                  <option value="hex">先按 hex 解码</option>
                  <option value="base64">先按 base64 解码</option>
                </select>
              </div>
            </div>
            <div data-role="dns-template-output"></div>
          </div>
        </details>
      `;

      const fieldSelect = pane.querySelector("#dns-template-field");
      const containsInput = pane.querySelector("#dns-template-contains");
      const delimiterInput = pane.querySelector("#dns-template-delimiter");
      const extractorSelect = pane.querySelector("#dns-template-extractor");
      const indexInput = pane.querySelector("#dns-template-index");
      const joinerInput = pane.querySelector("#dns-template-joiner");
      const decoderSelect = pane.querySelector("#dns-template-decoder");
      const output = pane.querySelector('[data-role="dns-template-output"]');

      if (fieldSelect) fieldSelect.value = state.field;
      if (containsInput) containsInput.value = state.contains;
      if (delimiterInput) delimiterInput.value = state.delimiter;
      if (extractorSelect) extractorSelect.value = state.extractor;
      if (indexInput) indexInput.value = state.segmentIndex;
      if (joinerInput) joinerInput.value = state.joiner;
      if (decoderSelect) decoderSelect.value = state.decoder;

      const renderDnsTemplate = () => {
        state.field = String(fieldSelect?.value || "query_name");
        state.contains = String(containsInput?.value || "");
        state.delimiter = String(delimiterInput?.value || ".");
        state.extractor = String(extractorSelect?.value || "first_label");
        state.segmentIndex = String(indexInput?.value || "0");
        state.joiner = String(joinerInput?.value || "");
        state.decoder = String(decoderSelect?.value || "auto");

        if (indexInput) {
          indexInput.disabled = state.extractor !== "nth_label";
        }

        const contains = state.contains.trim().toLowerCase();
        const filteredRows = analysisRows.filter((row) => {
          const value = String(row?.[state.field] || "");
          if (!contains) return true;
          return value.toLowerCase().includes(contains);
        });
        const extracted = filteredRows
          .map((row) => extractDnsTemplateValue(row?.[state.field], state.extractor, state.delimiter, state.segmentIndex))
          .filter((item) => String(item || "").trim());
        const joined = extracted.join(state.joiner);
        const decoded = state.decoder === "none"
          ? { text: joined, chain: [] }
          : decodeDnsChain(joined, state.decoder);

        output.innerHTML = `
          <div class="http-filter-count">命中 ${esc(String(filteredRows.length))} 条，提取 ${esc(String(extracted.length))} 条，拼接长度 ${esc(String(joined.length))}</div>
          <div class="ws-meta-grid">
            <div class="dns-output-card">
              <div class="ws-meta-label">提取样本</div>
              <pre>${esc(extracted.slice(0, 20).join("\n") || "(空)")}</pre>
            </div>
            <div class="dns-output-card">
              <div class="ws-meta-label">拼接结果</div>
              <pre>${esc(joined || "(空)")}</pre>
            </div>
          </div>
          <div class="dns-output-card" style="margin-top:10px;">
            <div class="ws-meta-label">尝试解码结果${decoded.chain.length ? ` (${esc(decoded.chain.join(" -> "))})` : ""}</div>
            <pre>${esc(decoded.text || "(空)")}</pre>
          </div>
        `;
      };

      for (const element of [fieldSelect, extractorSelect, decoderSelect]) {
        if (element) {
          element.addEventListener("change", renderDnsTemplate);
        }
      }
      for (const element of [containsInput, delimiterInput, indexInput, joinerInput]) {
        if (element) {
          element.addEventListener("input", renderDnsTemplate);
        }
      }

      renderDnsTemplate();
    }

    function renderAttackPane(pane, module, result) {
      const detail = result.detail || {};
      if (module.name === "WebShellDetector") {
        renderWebShellPane(pane, result);
        return;
      }
      const topKeys = Object.keys(detail).filter((k) => k.startsWith("top_"));
      const recordKey = ["records"].find((k) => Array.isArray(detail[k]));
      const alerts = result.alerts || [];
      const expectedRule = ruleMap[module.name];
      const filtered = expectedRule ? alerts.filter((a) => a.rule_id === expectedRule) : alerts;
      if (!filtered.length && !recordKey) {
        pane.innerHTML = `<div class="muted">模块 ${esc(module.name)} 未命中告警。</div>`;
        return;
      }

      let html = "";
      for (const topKey of topKeys) {
        const rows = detail[topKey] || [];
        const body = rows.map((item) => `<tr><td>${esc(item[0])}</td><td>${item[1]}</td></tr>`).join("")
          || `<tr><td colspan="2" class="muted">无数据</td></tr>`;
        html += `
          <details class="data" open>
            <summary>${esc(topKey)}</summary>
            <table><thead><tr><th>value</th><th>count</th></tr></thead><tbody>${body}</tbody></table>
          </details>
        `;
      }

      if (recordKey) {
        const rows = detail[recordKey] || [];
        if (rows.length) {
          const cols = Array.from(rows.reduce((set, row) => {
            Object.keys(row).forEach((k) => set.add(k));
            return set;
          }, new Set()));
          const body = rows.map((row) => `<tr>${cols.map((c) => `<td>${esc(row[c])}</td>`).join("")}</tr>`).join("");
          html += `
            <details class="data" open>
              <summary>${esc(recordKey)} (${rows.length})</summary>
              <table><thead><tr>${cols.map((c) => `<th>${esc(c)}</th>`).join("")}</tr></thead><tbody>${body}</tbody></table>
            </details>
          `;
        }
      }

      const body = filtered.map((alert) => `
        <tr>
          <td>${esc(alert.rule_id)}</td>
          <td>${esc(alert.severity)}</td>
          <td>${esc(alert.description)}</td>
          <td><pre style="margin:0;white-space:pre-wrap;font-size:11px;">${esc(JSON.stringify(alert.evidence || {}, null, 2))}</pre></td>
        </tr>
      `).join("");

      html += `
        <table>
          <thead><tr><th>规则ID</th><th>等级</th><th>描述</th><th>证据</th></tr></thead>
          <tbody>${body}</tbody>
        </table>
      `;
      pane.innerHTML = html;
    }

    function renderWebShellPane(pane, result) {
      const detail = result.detail || {};
      const rows = Array.isArray(detail.records) ? detail.records : [];
      const detected = Array.isArray(detail.detected_webshells) ? detail.detected_webshells : [];
      const state = getPaneUiState("attack:WebShellDetector", {
        selectedFamily: "",
        godzillaKeyText: "",
        godzillaKeyFile: null,
        godzillaKeyFileName: "",
        godzillaLoading: false,
        godzillaError: "",
        godzillaResult: null,
      });
      const defaultOptions = [
        { value: "china_chopper_like", label: "中国菜刀类 PHP WebShell" },
        { value: "cookie_exec_like", label: "Cookie 命令执行类 PHP WebShell" },
        { value: "godzilla_like", label: "哥斯拉类 PHP WebShell" },
      ];
      const familyOptions = Array.isArray(detail.supported_family_options) && detail.supported_family_options.length
        ? detail.supported_family_options
        : defaultOptions;
      const supported = Array.isArray(detail.supported_webshell_types) && detail.supported_webshell_types.length
        ? detail.supported_webshell_types
        : familyOptions.map((item) => item.label);

      const section = (title, items, emptyText = "无数据") => {
        const body = (Array.isArray(items) && items.length)
          ? items.map((item) => `<pre class="ws-pre-block">${esc(item)}</pre>`).join("")
          : `<div class="muted">${esc(emptyText)}</div>`;
        return `
          <details class="data" open>
            <summary>${esc(title)}</summary>
            <div style="padding-top:10px;">${body}</div>
          </details>
        `;
      };

      const uniqueTexts = (values) => {
        const seen = new Set();
        const items = [];
        for (const value of values || []) {
          const text = String(value || "").trim();
          if (!text || seen.has(text)) {
            continue;
          }
          seen.add(text);
          items.push(text);
        }
        return items;
      };

      const commandSection = (title, records, emptyText = "无数据") => {
        const renderCommandItem = (row) => {
          const packetParts = [];
          if (row.packet_index != null) {
            packetParts.push(`packet=${row.packet_index}`);
          }
          if (row.response_packet_index != null) {
            packetParts.push(`response=${row.response_packet_index}`);
          }
          if (row.request_packet_index != null) {
            packetParts.push(`request=${row.request_packet_index}`);
          }
          const transcript = String(row.interaction_command || "").trim();
          const exports = Array.isArray(row.exported_artifacts) ? row.exported_artifacts : [];
          const links = exports.map((item) => {
            const url = String(item.url || "").trim();
            const viewerUrl = String(item.viewer_url || "").trim();
            if (!url && !viewerUrl) return "";
            const name = String(item.name || viewerUrl || url).trim();
            const parts = [];
            if (viewerUrl) {
              parts.push(`view=<a href="${esc(viewerUrl)}" target="_blank" rel="noopener noreferrer">${esc(name)}</a>`);
            }
            if (url) {
              parts.push(`raw=<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(name)}</a>`);
            }
            return `<div>${parts.join(" | ")}</div>`;
          }).filter(Boolean).join("");
          return `
            <div class="ws-command">
              <div class="ws-command-meta">${esc(packetParts.join(", ") || "packet=?")}</div>
              <pre>${esc(transcript || "(空)")}</pre>
              ${links ? `<div class="ws-command-links">${links}</div>` : ""}
            </div>
          `;
        };
        const body = (Array.isArray(records) && records.length)
          ? records.map(renderCommandItem).join("")
          : `<div class="muted">${esc(emptyText)}</div>`;
        return `
          <details class="data" open>
            <summary>${esc(title)}</summary>
            <div style="padding-top:10px;">${body}</div>
          </details>
        `;
      };

      const logSection = (title, items, emptyText = "无数据") => {
        const renderLogItem = (item) => {
          const lines = String(item || "").split("\n").map((line) => {
            if (line.startsWith("export_url=")) {
              const url = line.slice("export_url=".length).trim();
              return `export_url=<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`;
            }
            return esc(line);
          }).join("\n");
          return `<pre class="ws-pre-block">${lines}</pre>`;
        };
        const body = (Array.isArray(items) && items.length)
          ? items.map(renderLogItem).join("")
          : `<div class="muted">${esc(emptyText)}</div>`;
        return `
          <details class="data" open>
            <summary>${esc(title)}</summary>
            <div style="padding-top:10px;">${body}</div>
          </details>
        `;
      };

      const parserOptions = [
        { value: "__all__", label: "全部已命中类型" },
        ...familyOptions,
      ];
      const preferredSelected = detected.length === 1
        ? (rows.find((item) => item.possible_webshell === detected[0]) || {}).family_variant || "__all__"
        : "__all__";
      const initialSelected = parserOptions.some((item) => item.value === state.selectedFamily)
        ? state.selectedFamily
        : preferredSelected;
      const optionLabelMap = Object.fromEntries(parserOptions.map((item) => [String(item.value), String(item.label)]));
      state.selectedFamily = initialSelected;

      const renderGodzillaKvItem = (key, value) => `
        <div class="item">
          <div class="k">${esc(key)}</div>
          <div class="v">${esc(value || "-")}</div>
        </div>
      `;

      const renderNestedAnalysis = (title, analysis) => {
        if (!analysis || !analysis.label) {
          return "";
        }
        const lines = [String(analysis.label || "").trim(), String(analysis.summary || "").trim()]
          .filter(Boolean)
          .join("\n");
        if (!lines) {
          return "";
        }
        return `
          <div class="ws-godzilla-section-title">${esc(title)}</div>
          <pre>${esc(lines)}</pre>
        `;
      };

      const godzillaSourceLabel = (mode) => ({
        upload_file: "上传文件",
        path_file: "输入路径文件",
        inline_lines: "输入多行候选",
        single_key: "单个密钥",
        empty: "空输入",
      }[String(mode || "")] || "未知来源");

      const godzillaFileMetaText = () => (
        state.godzillaKeyFileName
          ? `当前已选择字典文件: ${state.godzillaKeyFileName}`
          : "也可以直接上传密钥字典文件，系统会按行逐个尝试。"
      );

      const renderGodzillaResult = () => {
        if (state.godzillaLoading) {
          return `<div class="ws-godzilla-meta">正在尝试哥斯拉密钥解析...</div>`;
        }
        if (state.godzillaError) {
          return `<div class="ws-godzilla-meta" style="color:#fca5a5;">${esc(state.godzillaError)}</div>`;
        }
        const payload = state.godzillaResult;
        if (!payload) {
          return `<div class="ws-godzilla-meta">支持输入单个密钥，也支持输入本地文件路径或上传字典文件按行尝试。</div>`;
        }

        const sourceMeta = payload.candidate_source || {};
        const matchedContext = payload.matched_context || {};
        const contexts = Array.isArray(payload.contexts) ? payload.contexts : [];
        const statusText = !payload.matched
          ? "未找到可用密钥"
          : payload.exact_match
            ? "marker 精确匹配并完成解析"
            : "已按当前密钥尝试解析（未精确命中 marker）";
        const sourceText = [
          godzillaSourceLabel(sourceMeta.mode),
          sourceMeta.label ? String(sourceMeta.label) : "",
        ].filter(Boolean).join("\n");

        const contextHtml = contexts.length
          ? contexts.map((context, contextIndex) => {
              const entries = Array.isArray(context.entries) ? context.entries : [];
              const entryHtml = entries.length
                ? entries.map((entry, entryIndex) => {
                    const titleParts = [];
                    if (entry.request_packet_index != null) {
                      titleParts.push(`request=${entry.request_packet_index}`);
                    }
                    if (entry.response_packet_index != null) {
                      titleParts.push(`response=${entry.response_packet_index}`);
                    }
                    if (entry.request?.summary) {
                      titleParts.push(`req:${entry.request.summary}`);
                    }
                    if (entry.response?.summary) {
                      titleParts.push(`resp:${entry.response.summary}`);
                    }
                    const requestText = String(entry.request?.text || entry.request?.preview || "").trim() || "(空)";
                    const responseText = String(entry.response?.text || entry.response?.preview || "").trim() || "(空)";
                    return `
                      <div class="ws-godzilla-entry">
                        <div class="ws-godzilla-entry-title">${esc(titleParts.join(" | ") || `entry=${entryIndex + 1}`)}</div>
                        ${renderNestedAnalysis("请求二次识别", entry.request?.nested_analysis)}
                        <div class="ws-godzilla-section-title">请求内容</div>
                        <pre>${esc(requestText)}</pre>
                        ${renderNestedAnalysis("响应二次识别", entry.response?.nested_analysis)}
                        <div class="ws-godzilla-section-title">响应内容</div>
                        <pre>${esc(responseText)}</pre>
                      </div>
                    `;
                  }).join("")
                : `<div class="muted">当前上下文没有可展示的解密条目。</div>`;

              return `
                <div class="ws-godzilla-result">
                  <div class="ws-godzilla-kv">
                    ${renderGodzillaKvItem("URI", context.uri || "-")}
                    ${renderGodzillaKvItem("参数名", context.pass_param || "pass")}
                    ${renderGodzillaKvItem("左 marker", context.marker_left || "-")}
                    ${renderGodzillaKvItem("右 marker", context.marker_right || "-")}
                    ${renderGodzillaKvItem("条目数", String(context.entry_count ?? entries.length ?? 0))}
                  </div>
                  ${entryHtml}
                </div>
              `;
            }).join("")
          : `<div class="ws-godzilla-meta">当前没有可展示的哥斯拉会话上下文。</div>`;

        return `
          <div class="ws-godzilla-result">
            <div class="ws-godzilla-kv">
              ${renderGodzillaKvItem("解析状态", statusText)}
              ${renderGodzillaKvItem("使用密钥", payload.used_key || "-")}
              ${renderGodzillaKvItem("命中来源", payload.matched_input || "-")}
              ${renderGodzillaKvItem("派生方式", payload.matched_derivation || "-")}
              ${renderGodzillaKvItem("候选来源", sourceText || "-")}
              ${renderGodzillaKvItem("候选数量", String(payload.candidate_count || 0))}
              ${renderGodzillaKvItem("原始输入数", String(payload.candidate_input_count || 0))}
              ${renderGodzillaKvItem("命中 URI", matchedContext.uri || "-")}
              ${renderGodzillaKvItem("命中参数", matchedContext.pass_param || "-")}
            </div>
          </div>
          ${contextHtml}
        `;
      };

      const renderGodzillaTools = () => `
        <details class="data" open>
          <summary>哥斯拉密钥解析</summary>
          <div class="ws-godzilla-box">
            <div class="ws-filter-row">
              <label for="ws-godzilla-key-text">密钥 / 本地文件路径</label>
              <input
                id="ws-godzilla-key-text"
                type="text"
                value="${esc(state.godzillaKeyText || "")}"
                placeholder="输入单个密钥，或输入 E:\\keys\\godzilla.txt 这类本地文件路径"
              >
            </div>
            <div class="ws-filter-row">
              <label for="ws-godzilla-key-file">密钥文件</label>
              <input id="ws-godzilla-key-file" type="file">
            </div>
            <div class="ws-inline-actions">
              <button type="button" class="ws-primary-btn" data-role="ws-godzilla-submit"${state.godzillaLoading ? " disabled" : ""}>
                ${state.godzillaLoading ? "解析中..." : "尝试解析"}
              </button>
              <div class="ws-godzilla-meta">如果输入内容是本地文件路径，就按行读取尝试；否则直接按单个密钥解析。</div>
            </div>
            <div class="ws-godzilla-meta" data-role="ws-godzilla-file-meta">${esc(godzillaFileMetaText())}</div>
            <div data-role="ws-godzilla-result">${renderGodzillaResult()}</div>
          </div>
        </details>
      `;

      pane.innerHTML = `
        <div class="muted" style="margin-bottom:8px;">WebShell 检测</div>
        <details class="data" open>
          <summary>可能是什么 WebShell</summary>
          <div style="padding-top:10px;">
            <div class="ws-meta-grid">
              <div class="ws-meta-card">
                <div class="ws-meta-label">当前命中</div>
                <div class="ws-meta-body">${detected.length ? esc(detected.join("\n")) : "未命中已知家族"}</div>
              </div>
              <div class="ws-meta-card">
                <div class="ws-meta-label">当前支持</div>
                <div class="ws-meta-body">${supported.length ? esc(supported.join("\n")) : "暂无已注册类型"}</div>
              </div>
            </div>
            <div class="ws-filter-row">
              <label for="ws-family-select">选择进行解析</label>
              <select id="ws-family-select">
                ${parserOptions.map((item) => `<option value="${esc(item.value)}">${esc(item.label)}</option>`).join("")}
              </select>
            </div>
          </div>
        </details>
        <div data-role="ws-pane-content"></div>
      `;

      const select = pane.querySelector("#ws-family-select");
      const content = pane.querySelector('[data-role="ws-pane-content"]');

      const renderSelectedFamily = (selectedValue) => {
        state.selectedFamily = selectedValue;
        const filteredRows = selectedValue === "__all__"
          ? rows
          : rows.filter((item) => String(item.family_variant || "") === selectedValue);
        const scripts = uniqueTexts(filteredRows.map((item) => item.php_script));
        const logs = uniqueTexts(filteredRows.map((item) => item.log_output));
        const familyLabel = optionLabelMap[selectedValue] || "该类型";
        const hasGodzillaRows = filteredRows.some((item) => String(item.family_variant || "") === "godzilla_like");
        const emptyText = selectedValue === "__all__"
          ? "无数据"
          : `当前结果里没有 ${familyLabel} 命中`;
        content.innerHTML = `
          ${hasGodzillaRows ? renderGodzillaTools() : ""}
          ${commandSection("交互命令", filteredRows, emptyText)}
          ${section("原 PHP 脚本", scripts, emptyText)}
          ${logSection("其他日志", logs, emptyText)}
        `;

        if (!hasGodzillaRows) {
          return;
        }

        const keyTextInput = content.querySelector("#ws-godzilla-key-text");
        const keyFileInput = content.querySelector("#ws-godzilla-key-file");
        const submitBtn = content.querySelector('[data-role="ws-godzilla-submit"]');
        const fileMeta = content.querySelector('[data-role="ws-godzilla-file-meta"]');

        if (keyTextInput) {
          keyTextInput.addEventListener("input", () => {
            state.godzillaKeyText = String(keyTextInput.value || "");
            state.godzillaError = "";
          });
        }

        if (keyFileInput) {
          keyFileInput.addEventListener("change", () => {
            const file = keyFileInput.files && keyFileInput.files[0] ? keyFileInput.files[0] : null;
            state.godzillaKeyFile = file;
            state.godzillaKeyFileName = file ? String(file.name || "") : "";
            state.godzillaError = "";
            if (fileMeta) {
              fileMeta.textContent = godzillaFileMetaText();
            }
          });
        }

        if (submitBtn) {
          submitBtn.addEventListener("click", async () => {
            if (state.godzillaLoading) {
              return;
            }
            if (!currentJobId) {
              state.godzillaError = "当前没有可用任务，无法执行哥斯拉密钥解析";
              state.godzillaResult = null;
              renderSelectedFamily(state.selectedFamily || "__all__");
              return;
            }

            const keyText = String(state.godzillaKeyText || "").trim();
            if (!keyText && !state.godzillaKeyFile) {
              state.godzillaError = "请输入密钥、本地文件路径，或选择一个密钥文件";
              state.godzillaResult = null;
              renderSelectedFamily(state.selectedFamily || "__all__");
              return;
            }

            state.godzillaLoading = true;
            state.godzillaError = "";
            renderSelectedFamily(state.selectedFamily || "__all__");

            try {
              const formData = new FormData();
              if (keyText) {
                formData.append("key_text", keyText);
              }
              if (state.godzillaKeyFile) {
                formData.append(
                  "key_file",
                  state.godzillaKeyFile,
                  state.godzillaKeyFile.name || "godzilla_keys.txt"
                );
              }
              const resp = await fetch(`/api/jobs/${currentJobId}/webshell/godzilla/parse`, {
                method: "POST",
                body: formData,
              });
              const payload = await resp.json();
              if (!resp.ok || !payload.ok) {
                throw new Error(payload?.detail || "哥斯拉密钥解析失败");
              }
              state.godzillaResult = payload.result || null;
              state.godzillaError = "";
              log(`哥斯拉密钥解析完成: candidates=${state.godzillaResult?.candidate_count || 0}`);
            } catch (err) {
              state.godzillaResult = null;
              state.godzillaError = err?.message || String(err);
              log(`哥斯拉密钥解析失败: ${state.godzillaError}`, "ERROR");
            } finally {
              state.godzillaLoading = false;
              renderSelectedFamily(state.selectedFamily || "__all__");
            }
          });
        }
      };

      if (select) {
        select.value = initialSelected;
        select.addEventListener("change", () => {
          state.selectedFamily = select.value;
          renderSelectedFamily(select.value);
        });
      }
      renderSelectedFamily(initialSelected);
    }

    async function loadModuleCatalog() {
      const resp = await fetch("/api/modules");
      const payload = await resp.json();
      if (!resp.ok || !payload.ok) {
        throw new Error(payload?.detail || "模块加载失败");
      }
      moduleCatalog = payload.modules || { protocols: [], attacks: [] };
      renderLibrary();
      log(`模块库加载完成: protocols=${moduleCatalog.protocols.length}, attacks=${moduleCatalog.attacks.length}`);
    }

    fileInput.addEventListener("change", async () => {
      const file = fileInput.files && fileInput.files[0];
      document.getElementById("meta-file-name").textContent = file ? file.name : "-";
      document.getElementById("meta-file-size").textContent = file ? formatBytes(file.size) : "-";
      document.getElementById("meta-file-time").textContent = file ? new Date(file.lastModified).toLocaleString() : "-";
      document.getElementById("meta-packet-count").textContent = "0";

      if (!file) return;
      log(`文件已选择，自动开始基础解析: ${file.name}`);
      await startBaseJob();
    });

    restartBtn.addEventListener("click", async () => {
      if (!fileInput.files || !fileInput.files[0]) {
        log("请先选择文件", "WARN");
        return;
      }
      log("手动触发重新基础解析");
      await startBaseJob();
    });

    clearActiveBtn.addEventListener("click", async () => {
      const ids = activeModules.map((m) => moduleId(m));
      for (const id of ids) {
        await removeActiveModuleById(id);
      }
      renderWorkspace();
      log("解析栏目已清空");
    });

    clearLogBtn.addEventListener("click", () => {
      consoleBox.textContent = "[INFO] 日志已清空";
    });
    projectRefreshBtn.addEventListener("click", async () => {
      await loadProjectCatalog();
      log("项目列表已刷新");
    });
    projectDeleteSelectedBtn.addEventListener("click", async () => {
      await deleteSelectedProjects();
    });
    projectClearDeletableBtn.addEventListener("click", async () => {
      await clearDeletableProjects();
    });
    projectPruneBtn.addEventListener("click", async () => {
      await pruneProjects();
    });

    document.getElementById("run-form").addEventListener("submit", (e) => e.preventDefault());

    setupDropZone();
    initResizers();
    applyBoardLayout();
    applyTopLayout();
    renderActiveModules();
    renderWorkspace();
    Promise.all([loadModuleCatalog(), loadProjectCatalog()]).catch((err) => {
      setStatus("初始化失败", "err");
      log(`初始化失败: ${err.message || err}`, "ERROR");
    });
  </script>
</body>
</html>
